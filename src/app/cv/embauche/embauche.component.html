@if (embauchees().length > 0) {
  <div class="alert alert-secondary mt-2">
    Liste des cv pré embauchées:
    <div class="embauchee row">
      @for (embauche of embauchees(); track embauche.id ) {
        <div class="col-4">
          <app-cv-item [cv]="embauche" [size]="150" />
        </div>
      }
    </div>
  </div>
}
