<ol class="list-group" data-testid="listCvs">
  @for (cv of cvs(); track cv.id ) {
    <li class="list-group-item" [class]="{
      'list-group-item-primary': $odd,
      'list-group-item-secondary': $even,
    }">
      <app-cv-item  [cv]="cv" />
    </li>
  }
  @empty {
    <li class="list-group-item-danger">Aucun Cv</li>
  }
</ol>
